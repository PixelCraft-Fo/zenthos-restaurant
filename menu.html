<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Zenthos Restaurant</title>
    <link rel preload href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ===== CSS Variables ===== */
        :root {
            --navy-dark: #0a0e1a;
            --navy: #0a1628;
            --navy-light: #1a2744;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --cream: #fdf8f0;
            --white: #ffffff;
            --text-muted: #8a9bb5;
        }

        /* ===== Reset & Base ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--cream);
            color: var(--navy-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        /* ===== Navbar ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background-color 0.4s ease, padding 0.4s ease, box-shadow 0.4s ease;
            background-color: transparent;
        }

        .navbar.scrolled {
            background-color: var(--navy-dark);
            padding: 0.8rem 2rem;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
        }

        .navbar-logo img {
            height: 70px;
            transition: height 0.4s ease;
        }

        .navbar.scrolled .navbar-logo img {
            height: 55px;
        }

        .navbar-links {
            display: flex;
            align-items: center;
            gap: 2rem;
            list-style: none;
        }

        .navbar-links a {
            color: var(--white);
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            position: relative;
            transition: color 0.3s ease;
        }

        .navbar-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--gold);
            transition: width 0.3s ease;
        }

        .navbar-links a:hover {
            color: var(--gold);
        }

        .navbar-links a:hover::after {
            width: 100%;
        }

        .navbar-links a.active {
            color: var(--gold);
        }

        .navbar-links a.active::after {
            width: 100%;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 1001;
        }

        .hamburger span {
            width: 28px;
            height: 2px;
            background-color: var(--white);
            transition: all 0.3s ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* ===== Hero ===== */
        .hero {
            height: 40vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: var(--navy-dark);
            position: relative;
            overflow: hidden;
            padding: 0 1rem;
        }

        .hero-content {
            animation: fadeInUp 1s ease forwards;
        }

        .hero h1 {
            font-size: 3.5rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== Menu Tabs ===== */
        .menu-tabs-section {
            padding: 3rem 1rem 0;
            background-color: var(--cream);
        }

        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            max-width: 800px;
            margin: 0 auto 2.5rem;
        }

        .tab-btn {
            padding: 0.75rem 2rem;
            border: 2px solid var(--navy);
            background: transparent;
            color: var(--navy);
            font-family: 'Lato', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            background-color: var(--navy);
            color: var(--white);
        }

        .tab-btn.active {
            background-color: var(--gold);
            border-color: var(--gold);
            color: var(--navy-dark);
        }

        /* ===== Menu Images ===== */
        .menu-image-container {
            text-align: center;
            padding: 0 1rem 3rem;
        }

        .menu-image-wrapper {
            position: relative;
            max-width: 700px;
            margin: 0 auto;
        }

        .menu-image {
            max-width: 700px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            opacity: 0;
            transition: opacity 0.5s ease;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .menu-image.active {
            opacity: 1;
            position: relative;
            left: auto;
            transform: none;
        }

        /* ===== CTA Strip ===== */
        .cta-strip {
            background-color: var(--navy-dark);
            padding: 3rem 1rem;
            text-align: center;
        }

        .cta-strip-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .cta-strip h3 {
            font-size: 1.8rem;
            color: var(--white);
            font-weight: 400;
        }

        .cta-btn {
            display: inline-block;
            padding: 0.9rem 2.5rem;
            background-color: var(--gold);
            color: var(--navy-dark);
            font-family: 'Lato', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 50px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .cta-btn:hover {
            background-color: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(201, 168, 76, 0.4);
        }

        /* ===== Footer ===== */
        .footer {
            background-color: var(--navy-dark);
            padding: 0;
        }

        .footer-meander {
            width: 100%;
            height: 12px;
            background: repeating-linear-gradient(
                90deg,
                var(--gold) 0px,
                var(--gold) 10px,
                transparent 10px,
                transparent 14px,
                var(--gold) 14px,
                var(--gold) 18px,
                transparent 18px,
                transparent 22px
            );
            opacity: 0.5;
        }

        .footer-content {
            text-align: center;
            padding: 3rem 1rem 2rem;
        }

        .footer-logo img {
            height: 60px;
            margin-bottom: 1rem;
        }

        .footer-tagline {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--gold);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        .footer-copyright {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ===== Scroll Reveal ===== */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .reveal.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            .navbar-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 70%;
                max-width: 300px;
                height: 100vh;
                background-color: var(--navy-dark);
                flex-direction: column;
                justify-content: center;
                gap: 2rem;
                transition: right 0.4s ease;
                box-shadow: -5px 0 20px rgba(0, 0, 0, 0.3);
            }

            .navbar-links.open {
                right: 0;
            }

            .hero h1 {
                font-size: 2.5rem;
            }

            .hero p {
                font-size: 1rem;
            }

            .tab-btn {
                padding: 0.6rem 1.4rem;
                font-size: 0.9rem;
            }

            .menu-image {
                max-width: 100%;
            }

            .cta-strip h3 {
                font-size: 1.4rem;
            }

            .cta-strip-content {
                flex-direction: column;
                gap: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- 📸 REPLACE WITH PHOTO: Hero background - Greek seaside restaurant or table spread with Mediterranean dishes -->
    <section class="hero">
        <div class="hero-content">
            <h1>Our Menu</h1>
            <p>Fresh ingredients, authentic recipes</p>
        </div>
    </section>

    <!-- ===== Menu Tabs ===== -->
    <section class="menu-tabs-section reveal">
        <div class="tabs-container">
            <button class="tab-btn active" data-tab="appetizers">Appetizers</button>
            <button class="tab-btn" data-tab="salads">Salads</button>
            <button class="tab-btn" data-tab="mains">Main Courses</button>
            <button class="tab-btn" data-tab="desserts">Desserts</button>
        </div>
    </section>

    <!-- ===== Menu Images ===== -->
    <section class="menu-image-container reveal">
        <div class="menu-image-wrapper">
            <img src="assets/menu_appetizers.png" alt="Appetizers Menu" class="menu-image active" data-tab="appetizers">
            <img src="assets/menu_salads.png" alt="Salads Menu" class="menu-image" data-tab="salads">
            <img src="assets/menu_mains.png" alt="Main Courses Menu" class="menu-image" data-tab="mains">

        </div>
    </section>

        <div class="cta-strip-content">

        </div>
    </section>

    <!-- ===== Footer ===== -->
    <footer class="footer">
        <div class="footer-meander"></div>
        <div class="footer-content">
            <div class="footer-logo">
                <img src="assets/logo1.png" alt="Zenthos Restaurant Logo">
            </div>

        </div>
    </footer>

    <!-- ===== JavaScript ===== -->
    <script>
        // --- Navbar Scroll Effect ---
        const navbar = document.querySelector('.navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // --- Hamburger Toggle ---
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.navbar-links');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('open');
        });

        // Close mobile menu when a link is clicked
        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navLinks.classList.remove('open');
            });
        });

        // --- Menu Tab Switching ---
        const tabButtons = document.querySelectorAll('.tab-btn');
        const menuImages = document.querySelectorAll('.menu-image');

        tabButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.getAttribute('data-tab');

                // Update active button
                tabButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // Update active image with fade
                menuImages.forEach(img => {
                    img.classList.remove('active');
                    if (img.getAttribute('data-tab') === tab) {
                        img.classList.add('active');
                    }
                });
            });
        });

        // --- Scroll Reveal (IntersectionObserver) ---
        const revealElements = document.querySelectorAll('.reveal');

        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('revealed');
                    revealObserver.unobserve(entry.target);
                }
            });
        }, {
            threshold: 0.15,
            rootMargin: '0px 0px -50px 0px'
        });

        revealElements.forEach(el => revealObserver.observe(el));
    </script>

</body>
